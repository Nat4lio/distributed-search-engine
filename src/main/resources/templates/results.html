<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Resultados</title>
</head>
<body>

<h1>Resultados para: <span th:text="${query}"></span></h1>

<ul>
    <li th:each="r : ${results}">
        <a th:href="${r.url}" th:text="${r.url}"></a> — 
        <span th:text="${r.title}"></span>
    </li>
</ul>

<a href="/">Voltar</a>

</body>
</html>
