<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Menu Principal</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f6f8; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .container { text-align: center; }
        h1 { color: #333; margin-bottom: 40px; font-size: 2.5rem; }
        .menu-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); transition: transform 0.2s; text-decoration: none; color: #333; display: flex; flex-direction: column; align-items: center; min-width: 200px; }
        .card:hover { transform: translateY(-5px); border: 1px solid #007bff; }
        .icon { font-size: 40px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 Search Engine Admin</h1>
        <div class="menu-grid">
            <a th:href="@{/search}" class="card"><div class="icon">🔎</div><h3>Pesquisa</h3></a>
            <a th:href="@{/index}" class="card"><div class="icon">➕</div><h3>Indexar Página</h3></a>
            <a th:href="@{/inlinks}" class="card"><div class="icon">🔗</div><h3>Inbound Links</h3></a>
        </div>
    </div>
</body>
</html>
