<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Resultados</title>
    <style>
        body { font-family: arial, sans-serif; margin: 0; }
        .header { padding: 20px 30px; border-bottom: 1px solid #ebebeb; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; background: white; z-index: 100; }
        .home-btn { background: #f1f3f4; padding: 8px 16px; border-radius: 4px; text-decoration: none; color: #333; font-size: 14px; }
        .home-btn:hover { background: #e8eaed; }
        .results-container { max-width: 650px; margin-left: 150px; padding: 20px; }
        @media (max-width: 800px) { .results-container { margin: 20px; } }
        .result-item { margin-bottom: 26px; }
        .title { color: #1a0dab; font-size: 20px; text-decoration: none; }
        .title:hover { text-decoration: underline; }
        .url { color: #202124; font-size: 14px; display: block; }
        .pagination { margin-top: 40px; display: flex; gap: 15px; }
    </style>
</head>
<body>
    <div class="header">
        <div style="font-weight:bold; font-size:20px;">Resultados</div>
        <a th:href="@{/}" class="home-btn">🏠 Voltar ao Menu</a>
    </div>

    <div class="results-container">
        <h3 th:if="${results != null}" style="color:#5f6368; font-weight:normal; font-size:14px;">
            Resultados para "<span th:text="${query}"></span>"
        </h3>

        <div th:each="r : ${results}" class="result-item">
            <span class="url" th:text="${r.url}"></span>
            <a class="title" th:href="${r.url}" th:text="${r.title}"></a>
            <div style="color:#4d5156; font-size:14px; margin-top:3px;" th:text="${r.snippet}"></div>
        </div>
        
        <div th:if="${results == null or results.isEmpty()}">
            <p>Nenhum resultado encontrado.</p>
        </div>

        <div class="pagination" th:if="${results != null and !results.isEmpty()}">
            <a th:if="${page > 1}" th:href="@{/results(q=${query}, p=${page - 1})}">◀ Anterior</a>
            <span>Página <span th:text="${page}"></span></span>
            <a th:href="@{/results(q=${query}, p=${page + 1})}">Próxima ▶</a>
        </div>
    </div>
</body>
</html>
